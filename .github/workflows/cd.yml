name: DangSim_CD

on:
  pull_request:
    branches: [ "dev", "deploy" ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test --no-daemon

      - name: 도버 이미지 빌드
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-spring-boot-app:${{ github.sha }} .

      - name: 도커 허브 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/my-spring-boot-app:${{ github.sha }}

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/dangsim
          chmod 600 ~/.ssh/dangsim

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: ~/.ssh/dangsim
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/my-spring-boot-app:${{ github.sha }}
            docker stop spring-boot-app || true
            docker rm spring-boot-app || true
            docker run -d --name spring-boot-app -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/my-spring-boot-app:${{ github.sha }}

# Notes:
# - Set the following repository secrets:
#   • DOCKER_USERNAME, DOCKER_PASSWORD (Docker Hub credentials)
#   • SERVER_HOST, SERVER_USER, SERVER_SSH_KEY (SSH access to your deployment server)
# - Adjust image name, ports, and run options as needed for your environment.
